services:
  - type: web
    name: gto-trainer
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node server.js
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SKIP_SCHEMA_INIT
        value: "true"
      - key: ADMIN_EMAILS
        sync: false
      - key: BUG_NOTIFICATION_EMAILS
        sync: false
      - key: NOTIFICATION_FROM_EMAIL
        sync: false
      - key: WELCOME_FROM_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CLOUDFLARE_ACCESS_ENABLED
        sync: false
      - key: CLOUDFLARE_ACCESS_TEAM_DOMAIN
        sync: false
      - key: CLOUDFLARE_ACCESS_AUD
        sync: false
